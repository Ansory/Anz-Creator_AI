name: Build Anz-Creator

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    name: Calculate next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: bump
        shell: bash
        run: |
          # Get latest tag, default v0.0.0 if none exists
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Strip 'v' prefix, split into parts
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Determine bump type (default patch for push events)
          BUMP="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP" ]; then
            BUMP="patch"
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "Next version: $NEW_TAG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: version

    steps:
      - name: Checkout code at new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FFmpeg (portable)
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp
          $ffmpegBin = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path ffmpeg-tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path bin
          Copy-Item $ffmpegBin.FullName -Destination bin\ffmpeg.exe
          Copy-Item $ffprobeBin.FullName -Destination bin\ffprobe.exe
          Remove-Item -Recurse -Force ffmpeg-tmp, ffmpeg.zip

      - name: Create version file
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          "VERSION = '$version'" | Out-File -FilePath version.py -Encoding utf8
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onefile --noconsole `
            --name "Anz-Creator" `
            --add-data "static;static" `
            --add-data "server.py;." `
            --add-data "core;core" `
            --add-data ".env.example;." `
            --add-binary "bin\ffmpeg.exe;." `
            --add-binary "bin\ffprobe.exe;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan.on" `
            --collect-all "google.generativeai" `
            --collect-all "gtts" `
            launcher.py

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release\Anz-Creator"
          Copy-Item "dist\Anz-Creator.exe" -Destination "release\Anz-Creator\"
          Copy-Item ".env.example" -Destination "release\Anz-Creator\"
          Copy-Item "README.md" -Destination "release\Anz-Creator\"
          New-Item -ItemType Directory -Force -Path "release\Anz-Creator\outputs"
          New-Item -ItemType Directory -Force -Path "release\Anz-Creator\assets\bgm"
          "Place MP3 BGM here: cinematic.mp3, happy.mp3, dark.mp3, motivational.mp3" | Out-File "release\Anz-Creator\assets\bgm\README.txt"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $zipName = "Anz-Creator-v$env:APP_VERSION-windows.zip"
          Compress-Archive -Path "release\Anz-Creator" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anz-Creator-windows-${{ needs.version.outputs.version }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Anz-Creator ${{ needs.version.outputs.tag }}
          tag_name: ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
          body: |
            ## Anz-Creator ${{ needs.version.outputs.tag }}

            **Windows build** — portable `.exe` with FFmpeg bundled.

            ### Install
            1. Download `${{ env.ZIP_NAME }}` below
            2. Extract to a folder
            3. Copy `.env.example` to `.env` and fill in your API keys
            4. Double-click `Anz-Creator.exe`

            ### Requirements
            - Windows 10 / 11
            - Google Chrome (for UI)
            - Gemini / Pexels / Pixabay API keys

            Built automatically by GitHub Actions — auto-incremented from previous release.
